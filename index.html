<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Preview - infinite.stl</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
        }
        
        .header {
            background: linear-gradient(135deg, #2da44e 0%, #218838 100%);
            color: white;
            padding: 20px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        #viewer-container {
            width: 100%;
            height: 500px;
            background: #f0f0f0;
            position: relative;
            cursor: grab;
        }
        
        #viewer-container:active {
            cursor: grabbing;
        }
        
        #viewer-container canvas {
            display: block;
        }
        
        .controls {
            padding: 20px 30px;
            background: #f6f8fa;
            border-top: 1px solid #e1e4e8;
        }
        
        .info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .file-info {
            color: #57606a;
            font-size: 14px;
        }
        
        .instructions {
            color: #6a737d;
            font-size: 12px;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .download-btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #2da44e;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }
        
        .download-btn:hover {
            background-color: #218838;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(45, 164, 78, 0.4);
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #57606a;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2da44e;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🎨 3D Model Preview</h1>
            <p>infinite.stl</p>
        </div>
        
        <div id="viewer-container">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                Loading 3D Model...
            </div>
        </div>
        
        <div class="controls">
            <p class="instructions">
                🖱️ Left-click + drag to rotate | Scroll to zoom | Right-click + drag to pan
            </p>
            <div class="info">
                <span class="file-info">📦 Format: STL (Standard Tessellation Language)</span>
                <a href="infinite.stl" 
                   download="infinite.stl" 
                   class="download-btn">
                   ⬇️ Download STL
                </a>
            </div>
        </div>
    </div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- STL Loader -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    
    <!-- OrbitControls for mouse interaction -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // Scene setup
        const container = document.getElementById('viewer-container');
        const loading = document.getElementById('loading');
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f0);
        
        // Camera setup
        const camera = new THREE.PerspectiveCamera(
            45,
            container.clientWidth / container.clientHeight,
            0.1,
            1000
        );
        camera.position.set(0, 0, 5);
        
        // Renderer setup
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);
        
        const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
        directionalLight2.position.set(-1, -1, -1);
        scene.add(directionalLight2);
        
        // Controls (mouse interaction)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.screenSpacePanning = true;
        
        // Load STL file
        const loader = new THREE.STLLoader();
        
        loader.load(
            'infinite.stl',
            function (geometry) {
                // Material
                const material = new THREE.MeshPhongMaterial({
                    color: 0x2da44e,
                    specular: 0x111111,
                    shininess: 200
                });
                
                const mesh = new THREE.Mesh(geometry, material);
                scene.add(mesh);
                
                // Center and scale the model
                geometry.computeBoundingBox();
                geometry.computeVertexNormals();
                
                const boundingBox = geometry.boundingBox;
                const center = new THREE.Vector3();
                boundingBox.getCenter(center);
                
                mesh.position.sub(center);
                
                const size = new THREE.Vector3();
                boundingBox.getSize(size);
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 3 / maxDim;
                mesh.scale.set(scale, scale, scale);
                
                // Adjust camera
                camera.position.z = maxDim * 2;
                controls.update();
                
                // Hide loading indicator
                loading.style.display = 'none';
            },
            function (xhr) {
                // Progress callback
                if (xhr.lengthComputable) {
                    const percent = (xhr.loaded / xhr.total * 100).toFixed(0);
                    loading.innerHTML = `<div class="spinner"></div>Loading... ${percent}%`;
                }
            },
            function (error) {
                // Error callback
                loading.innerHTML = '❌ Error loading STL file. Make sure the file exists.';
                console.error('Error loading STL:', error);
            }
        );
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>

</body>
</html>
